<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Yellow Outer Wrapper -->
    <div class="wrapper">

        <!-- Green Inner Container -->
        <div class="green-box">

            <!-- Row 1: wide box + small box -->
            <div class="row row-1">
                <div class="blue-box wide"></div>
                <div class="blue-box small"></div>
            </div>

            <!-- Row 2: small box + wide box -->
            <div class="row row-2">
                <div class="blue-box medium"></div>
                <div class="blue-box wide-2"></div>
            </div>

            <!-- Row 3: three equal boxes -->
            <div class="row row-3">
                <div class="blue-box equal"></div>
                <div class="blue-box equal"></div>
                <div class="blue-box equal"></div>
            </div>

        </div>

    </div>

</body>
</html>
