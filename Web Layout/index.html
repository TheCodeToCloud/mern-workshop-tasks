<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="wrapper">

        <!-- Top Blue Section -->
        <div class="top-section"></div>

        <!-- Bottom Yellow Section -->
        <div class="bottom-section">

            <!-- Left: Web Name -->
            <div class="col col-left">
                <h2 class="web-name">webName</h2>
                <p contenteditable="true" spellcheck="false">asdfasdfasdfasdf<br>asdfasdfasdf</p>
            </div>

            <!-- Middle: Quick Link -->
            <div class="col col-mid">
                <h3>Quick Link</h3>
                <div class="link-box" contenteditable="true" spellcheck="false"></div>
            </div>

            <!-- Right: Message Form -->
            <div class="col col-right">
                <h3>Message</h3>
                <input type="text" placeholder="Your name..." />
                <textarea placeholder="Your message..."></textarea>
                <button>Send</button>
            </div>

        </div>

    </div>

</body>
</html>
